name: Azure Backend Deploy

on:
  push:
    branches:
      - main
      - "feature/*"
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-deploy.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - "feature/*"
    paths:
      - 'backend/**'
      - '.github/workflows/azure-backend-deploy.yml'

jobs:
  deploy_backend_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: Deploy Backend to Production
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: leavescr-bvhvdthwh4e8dddj.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            leavescr-bvhvdthwh4e8dddj.azurecr.io/leaves-backend:prd
            leavescr-bvhvdthwh4e8dddj.azurecr.io/leaves-backend:prd-${{ github.sha }}

      - name: Log in to Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App with new image
        run: |
          az containerapp update \
            --name leaves-prd-ca \
            --resource-group leaves-app-rg \
            --image leavescr-bvhvdthwh4e8dddj.azurecr.io/leaves-backend:prd \
            --output none

          # Force revision activation to ensure update takes effect
          az containerapp revision list \
            --name leaves-prd-ca \
            --resource-group leaves-app-rg \
            --query "[0].name" -o tsv | \
          xargs -I {} az containerapp revision activate \
            --name leaves-prd-ca \
            --resource-group leaves-app-rg \
            --revision {}

      - name: Verify deployment
        run: |
          echo "✅ Production deployment completed at $(date)"
          az containerapp show \
            --name leaves-prd-ca \
            --resource-group leaves-app-rg \
            --query "{name:name,fqdn:properties.configuration.ingress.fqdn,latestRevision:properties.latestRevisionName}" \
            -o json

  deploy_backend_dev:
    if: (github.event_name == 'push' && github.ref != 'refs/heads/main') || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Deploy Backend to Dev
    steps:
      - uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: leavescr-bvhvdthwh4e8dddj.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            leavescr-bvhvdthwh4e8dddj.azurecr.io/leaves-backend:dev
            leavescr-bvhvdthwh4e8dddj.azurecr.io/leaves-backend:dev-${{ github.sha }}

      - name: Log in to Azure CLI
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App with new image
        run: |
          az containerapp update \
            --name leaves-dev-ca \
            --resource-group leaves-app-rg \
            --image leavescr-bvhvdthwh4e8dddj.azurecr.io/leaves-backend:dev \
            --output none

          # Force revision activation to ensure update takes effect
          az containerapp revision list \
            --name leaves-dev-ca \
            --resource-group leaves-app-rg \
            --query "[0].name" -o tsv | \
          xargs -I {} az containerapp revision activate \
            --name leaves-dev-ca \
            --resource-group leaves-app-rg \
            --revision {}

      - name: Verify deployment
        run: |
          echo "✅ Dev deployment completed at $(date)"
          az containerapp show \
            --name leaves-dev-ca \
            --resource-group leaves-app-rg \
            --query "{name:name,fqdn:properties.configuration.ingress.fqdn,latestRevision:properties.latestRevisionName}" \
            -o json
